<script>
fetch("https://api.github.com/repos/1Crafty/Bloxd-CSS-Editor/commits")
  .then(res => res.json())
  .then(data => {
    const sha = data[0].sha;
    return fetch(
      `https://cdn.jsdelivr.net/gh/1Crafty/Bloxd-CSS-Editor@${sha}/index.html`
    );
  })
  .then(res => res.text())
  .then(html => {
    document.open();
    document.write(html);
    document.close();
  })
  .catch(err => console.error(err));
</script>
